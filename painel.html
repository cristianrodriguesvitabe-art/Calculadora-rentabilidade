<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Painel ADS & Faturamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zalando+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<style>
  :root{--bg:#000000;--surface:#141414;--surface2:#1a1a1a;--ink:#f0e9e1;--muted:#8f8681;--line:#2a2a2a;--accent:#ea5339;--accent2:#f18f33;--pos:#c3d72c;--neg:#e5563c;--chartgrid:#1e1e1e;
    --display:"Fraunces",serif;--body:"Zalando Sans",system-ui,sans-serif;}
  html[data-theme=light]{--bg:#e8ded3;--surface:#faf8f6;--surface2:#f2ece4;--ink:#2b2422;--muted:#87725e;--line:#e2d5c8;--accent:#ea5339;--accent2:#f18f33;--pos:#77861a;--neg:#d0442c;--chartgrid:#e7ded3;}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}
  .topbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:30}
  .brand{font-family:var(--display);font-weight:700;font-size:15px;display:flex;align-items:center;gap:9px}
  .dot{width:11px;height:11px;border-radius:4px;background:linear-gradient(135deg,var(--accent),var(--accent2))}
  .brandlogo{height:24px;width:auto;display:block}
  .brandlogo.dark{display:none}
  html[data-theme=light] .brandlogo.light{display:none}
  html[data-theme=light] .brandlogo.dark{display:block}
  /* splash de carregamento */
  .splash{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:60px 20px;min-height:240px}
  .splash img{height:42px;width:auto}
  .splash .dots{display:flex;gap:6px}
  .splash .dots i{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.45;animation:splashp 1s infinite}
  .splash .dots i:nth-child(2){animation-delay:.2s}
  .splash .dots i:nth-child(3){animation-delay:.4s}
  @keyframes splashp{50%{opacity:1}}
  .splash .cap{font-size:12.5px;color:var(--muted)}
  .spacer{flex:1}
  select,button,input[type=date]{font-family:var(--body);font-size:12.5px;border-radius:8px;border:1px solid var(--line);background:var(--surface2);color:var(--ink);padding:7px 10px;cursor:pointer}
  button.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:0;color:#fff;font-weight:600}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:0;border-radius:0;background:transparent;padding:7px 11px}.seg button.on{background:var(--accent);color:#fff}
  .ctrls{display:flex;gap:7px;flex-wrap:wrap;align-items:center;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--surface)}
  .ctrls .lbl{font-size:11px;color:var(--muted)}
  .qbtns{display:inline-flex;gap:6px}.qbtns>span{display:flex;flex-direction:column;align-items:center;gap:2px}.qsub{font-size:9px;color:var(--muted)}
  .sep{width:1px;height:20px;background:var(--line);margin:0 3px}
  .wrap{max-width:1320px;margin:16px auto;padding:0 14px}
  #board{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;align-items:start}
  .block{grid-column:span 12;min-width:0}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px;height:100%}
  .kgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .eyebrow{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 6px}
  .kpi .val{font-weight:700;font-size:20px;letter-spacing:-.01em}.kpi .val.sm{font-size:17px}
  .delta{font-size:12px;margin-top:4px;font-weight:600}.delta.pos{color:var(--pos)}.delta.neg{color:var(--neg)}.delta.zero{color:var(--muted)}
  .sub{color:var(--muted);font-size:11px;margin-top:4px}
  .projhero{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .projhero .projtop{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .projhero .projbig{font-family:var(--display);font-weight:700;font-size:30px;letter-spacing:-.02em;margin-top:2px}
  .projhero .projpct{font-family:var(--display);font-weight:700;font-size:30px;text-align:right;line-height:1}
  .projhero .projpct span{display:block;font-family:var(--body);font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
  .projbar{height:8px;border-radius:999px;background:var(--surface2);overflow:hidden;display:flex;margin:10px 0 6px}
  .projbar .pf{background:var(--accent);height:100%}
  .projbar .pp{background:transparent;height:100%}
  .projhero.lin{background:var(--surface2);border-color:var(--line);margin-top:0}
  .projhero.lin .projbar .pf{background:var(--accent2)}
  .projhero.lin .projbar .pp{background:transparent}
  .projhero.fat{background:var(--surface2);border-color:var(--line);margin-top:0}
  .projhero.fat .projbar .pf{background:var(--pos)}
  .projhero.fat .projbar .pp{background:transparent}
  .projhero.info{background:var(--surface2);border-color:var(--line);margin-top:0}
  .statusbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .sfdot{width:14px;height:14px;border-radius:50%;flex:none}
  .sf-verde{background:var(--pos)}.sf-amarelo{background:var(--accent2)}.sf-vermelho{background:var(--neg)}.sf-cinza{background:var(--muted)}
  .sflabel{font-family:var(--display);font-weight:700;font-size:15px}
  .statusbar .meta2{color:var(--muted);font-size:12px}
  .statusbar .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .upd{font-size:11px;color:var(--muted)}
  [data-range].on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .barrow{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .barrow+.barrow{margin-top:9px;padding-top:9px;border-top:1px solid var(--line2)}
  .grp{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .chip{border-radius:999px;padding:6px 13px;font-size:12.5px;border:1px solid var(--line);background:var(--surface2);color:var(--muted);cursor:pointer;font-family:var(--body)}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .showing{font-size:12.5px;color:var(--muted);background:var(--surface2);border:1px solid var(--line2);border-radius:8px;padding:7px 12px;margin:10px 0 0;display:inline-block}
  .showing b{color:var(--ink)}.showing .cor{color:var(--accent);font-weight:600}
  .miniseg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .miniseg button{border:0;background:transparent;color:var(--muted);padding:5px 11px;font-size:11.5px;cursor:pointer;font-family:var(--body)}
  .miniseg button.on{background:var(--accent2);color:#111;font-weight:700}
  .pill{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:600}.pill.ok{background:rgba(34,197,94,.15);color:var(--pos)}.pill.bad{background:rgba(251,113,133,.15);color:var(--neg)}
  h2{font-family:var(--display);font-size:13px;font-weight:600;margin:0 0 11px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  h2 .ttl{display:flex;align-items:center;gap:7px;min-width:0}
  h2 .tag{font-family:var(--body);font-size:10.5px;color:var(--muted);font-weight:500;text-align:right}
  .bhandle{cursor:grab;color:var(--muted);opacity:.5;font-size:13px;user-select:none;touch-action:none}.bhandle:hover{opacity:1}
  .block.drag{opacity:.5}
  .legend{list-style:none;margin:8px 0 0;padding:0;display:flex;flex-direction:column;gap:4px}
  .legend li{display:grid;grid-template-columns:10px 1fr auto;gap:8px;align-items:center;font-size:12.5px}
  .sw{width:10px;height:10px;border-radius:3px}.lv{font-size:12px;color:var(--muted)}
  .gaugebox{display:flex;gap:16px;justify-content:center}.ga{flex:1;max-width:170px;text-align:center}
  .gring{position:relative;width:118px;height:118px;margin:0 auto}.gring canvas{position:absolute;inset:0;width:100%!important;height:100%!important;max-height:none}
  .gc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gc .big{font-weight:700;font-size:23px}.gc .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .gmeta{font-size:11px;color:var(--muted);margin-top:8px}
  .atbars{display:flex;flex-direction:column;gap:18px}
  .atrow .athead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .atrow .athead span{font-size:12px;color:var(--muted)}.atrow .athead b{font-size:21px;font-weight:700}
  .atrow .bar{height:10px}.atsub{font-size:11px;color:var(--muted);margin-top:6px}
  .canalwrap{display:flex;gap:16px;align-items:center;flex-wrap:wrap}.canaldon{width:188px;flex:none;position:relative}.canalwrap .legend{flex:1;min-width:200px;margin:0}
  .tplv{font-size:10.5px;color:var(--muted);margin-top:4px}
  .mbrow+.mbrow{margin-top:30px}
  .mbhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  .mblabel{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .mbreal{font-weight:700;font-size:15px}.mbpct{font-weight:700;font-size:13px}
  .lvbar{position:relative;height:12px;border-radius:999px;background:var(--surface2);margin:14px 4px 54px}
  .lvbar .fill{position:absolute;left:0;top:0;bottom:0;border-radius:999px}
  .lvbar .tick{position:absolute;top:-3px;width:2px;height:18px;border-radius:2px}
  .lvbar .tlbl{position:absolute;top:18px;transform:translateX(-50%);font-size:9px;color:var(--muted);text-align:center;line-height:1.35;white-space:nowrap}
  .tgap{font-size:8.5px}
  .mbsub{font-size:11px;color:var(--muted)}
  .roasrow,.triprog{display:flex;flex-direction:column;gap:9px}
  .roasrow .r{display:grid;grid-template-columns:120px 1fr auto;gap:9px;align-items:center;font-size:12.5px}
  .bar{height:8px;border-radius:999px;background:var(--surface2);overflow:hidden}.bar>span{display:block;height:100%;border-radius:999px}
  .bar .pos{background:var(--pos)}.bar .mid{background:var(--accent)}.bar .low{background:var(--neg)}
  .tp .tphead{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px}.tp .tphead b{font-weight:700}.tp .tphead span{font-weight:700}
  .tp .tpsub{font-size:11px;color:var(--ink);margin-top:4px}.tp .tpsub span{color:var(--muted)}
  .roasnum{font-weight:700}
  .paceline{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:5px 0;border-bottom:1px solid var(--line)}
  .paceline:last-child{border-bottom:0}.paceline span{color:var(--muted)}.paceline b{font-weight:700;text-align:right}
  .anosrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .anocard{flex:1;min-width:88px;background:var(--surface2);border-radius:9px;padding:8px 10px;text-align:center}.anocard .lbl{font-size:10px;color:var(--muted)}
  .tw{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12.5px}th,td{text-align:right;padding:7px 6px;border-bottom:1px solid var(--line);white-space:nowrap}th:first-child,td:first-child{text-align:left}
  th{font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);font-weight:500}
  tr.hl{background:rgba(99,102,241,.10)}.mini{font-size:10px;color:var(--muted)}
  canvas{max-height:230px}.empty{text-align:center;color:var(--muted);padding:24px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;padding:30px 12px;overflow:auto;z-index:50}.overlay.on{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;width:600px;max-width:100%;padding:20px}
  .modal h3{font-family:var(--display);margin:0 0 4px}.modal p{color:var(--muted);margin:0 0 12px;font-size:12.5px}
  label.f{display:block;font-size:11px;color:var(--muted);margin:10px 0 4px}
  .modal input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--surface2);color:var(--ink);font-size:12.5px}
  .mgrid{display:grid;grid-template-columns:40px repeat(4,1fr);gap:7px;align-items:center}.mgrid .h{font-size:10px;color:var(--muted);text-align:center}.mgrid .rl{font-weight:600;font-size:12px}
  .err{background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.4);color:#fecdd3;padding:9px 11px;border-radius:9px;font-size:12.5px;margin-bottom:12px}
  .modalfoot{display:flex;justify-content:flex-end;gap:9px;margin-top:18px}
  .dd{position:relative}
  .ddpanel{position:absolute;top:112%;left:0;z-index:40;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px;min-width:210px;max-height:300px;overflow:auto;display:none;box-shadow:0 10px 30px rgba(0,0,0,.4)}.ddpanel.on{display:block}
  .ddpanel label{display:flex;gap:8px;align-items:center;font-size:12.5px;padding:4px 3px;cursor:pointer;color:var(--ink)}
  .ddpanel .acts{display:flex;gap:8px;justify-content:space-between;margin-bottom:7px;border-bottom:1px solid var(--line);padding-bottom:7px}.ddpanel .acts a{color:var(--accent);font-size:12px;cursor:pointer}
  .diag{font-family:var(--body);font-size:12px;color:var(--muted);white-space:pre-wrap;line-height:1.6}.diag b{color:var(--ink)}
  .hint{font-size:11px;color:var(--muted);margin:0 0 10px}
  .b8{grid-column:span 8}.b7{grid-column:span 7}.b6{grid-column:span 6}.b5{grid-column:span 5}.b4{grid-column:span 4}
  @media(max-width:1000px){#board{grid-template-columns:1fr}.block,.b8,.b7,.b6,.b5,.b4{grid-column:span 1!important}.kgrid{grid-template-columns:repeat(3,1fr)}.pgrid{grid-template-columns:1fr}}
  @media(max-width:560px){.kgrid{grid-template-columns:1fr 1fr}.wrap{margin:12px auto;padding:0 10px}canvas{max-height:210px}.kpi .val{font-size:18px}}
</style>
</head>

<script>
/* ===== MOTOR EMBUTIDO ===== */
/* ================= PAINEL ADS — MOTOR (client-side) ================= */
/* Lê o Google Sheets via proxy CORS e calcula tudo no navegador.       */

const SHEET_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSM6NRFxSThFzMqIyJyE18h1lI1nuMvTKuzMKW-aoyJwfC031l_Q0NJSChBFVTUQJUrRLGjIM9gyOwq';
const GIDS = { adsRenova:'432173951', adsTiktok:'178673841', retroRenova:'80783708', retroTiktok:'611256132' };
const rawCsvUrl = (gid) => `${SHEET_BASE}/pub?gid=${gid}&single=true&output=csv`;
const PROXIES = [
  (u) => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
  (u) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
];

/* -------- CSV parsing (portado de csvSource.js) -------- */
function parseCSV(text) {
  const rows = []; let row = [], field = '', inQ = false, i = 0;
  while (i < text.length) {
    const c = text[i];
    if (inQ) { if (c === '"') { if (text[i+1] === '"') { field += '"'; i += 2; continue; } inQ = false; i++; continue; } field += c; i++; continue; }
    if (c === '"') { inQ = true; i++; continue; }
    if (c === ',') { row.push(field); field = ''; i++; continue; }
    if (c === '\r') { i++; continue; }
    if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
    field += c; i++;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}
function num(s) {
  if (typeof s === 'number') return s;
  if (s == null) return 0;
  let t = String(s).replace(/R\$/gi, '').replace(/\s|\u00A0/g, '').trim();
  if (!t || t === '-') return 0;
  const hasC = t.includes(','), hasD = t.includes('.');
  if (hasC && hasD) t = t.replace(/\./g, '').replace(',', '.');
  else if (hasC) t = t.replace(',', '.');
  const v = parseFloat(t.replace(/[^\d.\-]/g, ''));
  return isNaN(v) ? 0 : v;
}
function parseDate(s) {
  if (!s) return null;
  const t = String(s).trim();
  let m = t.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) { let [, d, mo, y] = m; if (y.length === 2) y = '20' + y; return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  m = t.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  return null;
}
const fillRow = (arr) => { const out = []; let last = ''; for (const v of arr) { const x = (v||'').trim(); if (x) last = x; out.push(last); } return out; };
const limpaCanal = (s) => (s||'').replace(/\benvios\b|\bshop\b/gi, '').replace(/\s+/g, ' ').trim();

async function fetchCsvRows(rawUrl) {
  let lastErr = null;
  for (const mk of PROXIES) {
    try {
      const res = await fetch(mk(rawUrl));
      if (!res.ok) { lastErr = new Error('HTTP ' + res.status); continue; }
      const text = await res.text();
      if (text.trim().startsWith('<')) { lastErr = new Error('resposta não-CSV'); continue; }

async function readAdsTab(rawUrl, defaultLabel = 'TikTok') {
  if (!rawUrl) return { registros: [] };
  const rows = await fetchCsvRows(rawUrl);
  let h2 = -1;
  for (let r = 0; r < Math.min(rows.length, 6); r++) {
    const low = rows[r].map((c) => (c||'').trim().toLowerCase());
    if (low.includes('custo') || low.includes('receita')) { h2 = r; break; }
  }
  if (h2 < 0) throw new Error('Não encontrei "Custo"/"Receita" na aba de ADS.');
  const sub = rows[h2].map((c) => (c||'').trim().toLowerCase());
  const top = fillRow(rows[h2 - 1] || []);
  const cols = [];
  for (let c = 1; c < sub.length; c++) {
    const tipo = sub[c] === 'custo' ? 'custo' : sub[c] === 'receita' ? 'receita' : null;
    if (!tipo) continue;
    cols.push({ idx: c, tipo, canal: limpaCanal(top[c]) || defaultLabel });
  }
  const map = new Map();
  for (let r = h2 + 1; r < rows.length; r++) {
    const date = parseDate(rows[r][0]); if (!date) continue;
    for (const col of cols) {
      const key = date + '|' + col.canal;
      const o = map.get(key) || { date, canal: col.canal, custo: 0, receita: 0 };
      o[col.tipo] += num(rows[r][col.idx]); map.set(key, o);
    }
  }
  return { registros: [...map.values()] };
}
async function readRevenueTab(rawUrl, defaultLabel = 'TikTok') {
  if (!rawUrl) return { registros: [] };
  const rows = await fetchCsvRows(rawUrl);
  let h = 0;
  while (h < rows.length && rows[h].every((c) => !(c||'').trim())) h++;
  const header = rows[h].map((c) => (c||'').trim());
  const cols = [];
  for (let c = 1; c < header.length; c++) {
    const nome = header[c];
    if (!nome || /total|semanal/i.test(nome)) continue;
    cols.push({ idx: c, canal: /fatur/i.test(nome) ? defaultLabel : limpaCanal(nome) });
  }
  const registros = [];
  for (let r = h + 1; r < rows.length; r++) {
    const date = parseDate(rows[r][0]); if (!date) continue;
    for (const col of cols) registros.push({ date, canal: col.canal, faturamento: num(rows[r][col.idx]) });
  }
  return { registros };
}

    {escopo:'Anual',realizado:r2(faturamentoAno),metaSel:r2(metaAnual),atingidoPct:metaAnual?r2(faturamentoAno/metaAnual*100):null,...nivelDoAno(faturamentoAno)}
  ];

  const pRefM=mOf(ate),pRefY=anoRef,pQ=triOf(pRefM);
  const pMesesQ=[(pQ-1)*3+1,(pQ-1)*3+2,(pQ-1)*3+3];
  const metaQp=Number(metaNivel['q'+pQ])||0;
  const pesos=pMesesQ.map(()=>1/3);
  const dailyOf=(y,m)=>{const nd=diasNoMes(y,m);const out=Array(nd).fill(0);for(const x of revF){if(yOf(x.date)===y&&mOf(x.date)===m)out[dOf(x.date)-1]+=Number(x.faturamento)||0;}return out.map(r2);};
  const mesesMeta=pMesesQ.map((m,idx)=>{const meta=r2(metaQp*pesos[idx]);const real=r2(soma(revF.filter(x=>yOf(x.date)===pRefY&&mOf(x.date)===m),'faturamento'));return {mes:MES[m-1],mesNum:m,meta,realizado:real,faltou:r2(Math.max(meta-real,0)),superou:r2(Math.max(real-meta,0)),pesoPct:r2(pesos[idx]*100)};});
  const realQuarter=r2(mesesMeta.reduce((s,m)=>s+m.realizado,0));
  const ndCur=diasNoMes(pRefY,pRefM);
  let pmY=pRefY,pm=pRefM-1;if(pm<1){pm=12;pmY--;}
  const serieLY=dailyOf(pRefY-1,pRefM),serieAnt=dailyOf(pmY,pm),serieAtu=dailyOf(pRefY,pRefM);
  const emAndamento=(pRefY===curY&&pRefM===curM);
  let capDiaCur;
  if(pRefY<curY||(pRefY===curY&&pRefM<curM))capDiaCur=ndCur;
  else if(emAndamento){let last=0;for(let i=0;i<serieAtu.length;i++)if((serieAtu[i]||0)>0)last=i+1;capDiaCur=last||Math.max(hoje.getDate()-1,1);}
  else capDiaCur=0;
  const metaMesCur=mesesMeta.find(x=>x.mesNum===pRefM)||{meta:0,realizado:0,faltou:0};
  const projLabels=Array.from({length:ndCur},(_,i)=>i+1);
  const fix=(arr)=>projLabels.map((_,i)=>i<arr.length?arr[i]:null);
  const atualSerie=projLabels.map((_,i)=>i<capDiaCur?r2(serieAtu[i]||0):null);
  const metaDiaSeason=projLabels.map(()=>r2(metaMesCur.meta/ndCur));
  const wDay=projLabels.map(()=>1/ndCur);
  const fracElapsed=wDay.slice(0,capDiaCur).reduce((a,b)=>a+b,0);
  const realizadoMesP=r2(serieAtu.slice(0,capDiaCur).reduce((a,b)=>a+(b||0),0));
  const projetadoMesP=fracElapsed>0?r2(realizadoMesP/fracElapsed):realizadoMesP;
  const projSerie=projLabels.map((_,i)=>i>=capDiaCur-1?r2(projetadoMesP*wDay[i]):null);
  const projecao={
    mesLabel:`${MES[pRefM-1]}/${String(pRefY).slice(2)}`,quarter:'Q'+pQ,labels:projLabels,
    series:{anoPassado:fix(serieLY),mesAnterior:fix(serieAnt),atual:atualSerie,metaDia:metaDiaSeason,projecao:projSerie},
    projecaoMes:{realizado:realizadoMesP,projetado:projetadoMesP,meta:r2(metaMesCur.meta),atingidoProjPct:metaMesCur.meta?r2(projetadoMesP/metaMesCur.meta*100):null,diasDecorridos:capDiaCur,diasMes:ndCur,emAndamento,base:'linear',mesNum:pRefM,mesLabel:MES[pRefM-1]},
    quarterResumo:{meta:r2(metaQp),realizado:realQuarter,faltou:r2(Math.max(metaQp-realQuarter,0)),atingidoPct:metaQp?r2(realQuarter/metaQp*100):null},
    mesesMeta};

  const deMes=`${curY}-${String(curM).padStart(2,'0')}-01`;
  const ateMes=iso(ontem);
  const inMes=(x)=>x.date>=deMes&&x.date<=ateMes;
  const revMes=revF.filter(inMes),adsMes=adsF.filter(inMes);
  const curQcal=triOf(curM);
  const metaQcurCal=Number(metaNivel['q'+curQcal])||0;
  const mesesQcur=[(curQcal-1)*3+1,(curQcal-1)*3+2,(curQcal-1)*3+3];
  const pesosCur=mesesQcur.map(()=>1/3);
  const metaMesCal=r2(metaQcurCal*(pesosCur[mesesQcur.indexOf(curM)]||0));
  const fMes=r2(soma(revMes,'faturamento')),iMes=r2(soma(adsMes,'custo')),rcMes=r2(soma(adsMes,'receita'));
  // extras p/ pílulas: vs meta proporcional e vs mês anterior (mesmo período)
  const diasCorr=Math.max(ontem.getDate(),0);
  const diasMesCur=diasNoMes(curY,curM);
  const metaProp=r2(metaMesCal*diasCorr/diasMesCur);
  const vsMetaProp=metaProp?pct(fMes,metaProp):null;
  let maY=curY,maM=curM-1;if(maM<1){maM=12;maY--;}
  const fatMesAntMP=r2(soma(revF.filter(x=>yOf(x.date)===maY&&mOf(x.date)===maM&&dOf(x.date)<=diasCorr),'faturamento'));
  const vsMesAnterior=fatMesAntMP?pct(fMes,fatMesAntMP):null;
  const resumoMes={de:deMes,ate:ateMes,mesLabel:MES[curM-1],faturamento:fMes,investimento:iMes,receitaAds:rcMes,roas:iMes?r2(fMes/iMes):null,meta:metaMesCal,atingidoPct:metaMesCal?r2(fMes/metaMesCal*100):null,diasCorr,diasMesCur,metaProp,vsMetaProp,fatMesAntMP,vsMesAnterior};
  const inQ=(x)=>yOf(x.date)===curY&&triOf(mOf(x.date))===curQcal&&x.date<=ateMes;
  const revQ=revF.filter(inQ),adsQ=adsF.filter(inQ);
  const fQ=r2(soma(revQ,'faturamento')),iQ=r2(soma(adsQ,'custo')),rcQ=r2(soma(adsQ,'receita'));
  const resumoQuarter={quarter:'Q'+curQcal,meta:r2(metaQcurCal),faturamento:fQ,investimento:iQ,receitaAds:rcQ,roas:iQ?r2(fQ/iQ):null,atingidoPct:metaQcurCal?r2(fQ/metaQcurCal*100):null};

  const projPctSem=metaMesCur.meta?projetadoMesP/metaMesCur.meta*100:null;
  let semStatus='cinza',semLabel='sem meta definida';
  if(projPctSem!=null){if(projPctSem>=100){semStatus='verde';semLabel='No ritmo p/ bater a meta';}else if(projPctSem>=85){semStatus='amarelo';semLabel='Um pouco atrás da meta';}else{semStatus='vermelho';semLabel='Atrás da meta';}}
  const semaforo={status:semStatus,label:semLabel,projPct:projPctSem!=null?r2(projPctSem):null,mesLabel:MES[pRefM-1]};

  const acReal=[],acMeta=[];let sR=0,sM=0;
  for(let i=0;i<ndCur;i++){sM+=metaDiaSeason[i]||0;acMeta.push(r2(sM));if(i<capDiaCur){sR+=serieAtu[i]||0;acReal.push(r2(sR));}else acReal.push(null);}
  const acProj=Array(ndCur).fill(null);let sP=sR;if(capDiaCur>=1)acProj[capDiaCur-1]=r2(sR);

  const acumulado={labels:projLabels,realizado:acReal,meta:acMeta,projecao:acProj,metaTotal:r2(metaMesCur.meta)};

  const anoLY=anoRef-1;
  const historicoLY={ano:anoLY,trimestres:[1,2,3,4].map(q=>({q:'Q'+q,total:r2(soma(revF.filter(x=>yOf(x.date)===anoLY&&triOf(mOf(x.date))===q),'faturamento'))})),meses:MES.map((nome,i)=>({mes:nome,total:r2(soma(revF.filter(x=>yOf(x.date)===anoLY&&mOf(x.date)===i+1),'faturamento'))}))};

  return {
    configurado:Boolean(cfg.urls.adsRenova||cfg.urls.retroRenova||cfg.urls.adsTiktok||cfg.urls.retroTiktok),
    periodo:{de,ate,gran,compara},anoRef,anosDisponiveis:anos,maxData,
    nivelSelecionado:nivelSel,canaisDisponiveis,canaisSelecionados:canaisSel,mesesDisponiveis,
    erros,diagnostico:diag,
    cards:{faturamentoPeriodo:r2(faturamentoPeriodo),crescimentoPeriodo,comparaLabel,investimento:r2(investimento),receitaAds:r2(receitaAds),roasGeral,metaRoas:Number(cfg.metas.roas)||0,roasAtingido:(Number(cfg.metas.roas)||0)?(roasGeral!=null&&roasGeral>=cfg.metas.roas):null,triAtual,metaAnual:r2(metaAnual),atingimentoAnual,faturamentoAno:r2(faturamentoAno),faltaAnual:metaAnual?r2(Math.max(metaAnual-faturamentoAno,0)):null},
    porCanal,roasPorCanal,trimestres,tabelaMetas,realizadoTri:realTri,comparativoMensal,
    pace,comparativoAnos,totaisAnuais,evolucaoAno,
    evolucao,evolucaoInvest,evolucaoCanal,roasDiario,projecao,metasResumo,
    resumoMes,resumoQuarter,semaforo,acumulado,historicoLY,
  };
}

function montaNivelSeg(sel){const el=document.getElementById('nivelSeg');el.innerHTML=['M1','M2','M3','M4'].map(n=>`<button data-nivel="${n}" class="${n===sel?'on':''}">${n}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.nivel=b.dataset.nivel;carregar();});}

function bloco(id,span,inner){return `<section class="block ${span}" data-block="${id}">${inner}</section>`;}
function render(d){TC=tc();const c=d.cards,p2=d.pace,rt=d.realizadoTri,pj=d.projecao;const mostrarMes=pj.projecaoMes.diasDecorridos>=5;const mostrarQuarter=((pj.projecaoMes.mesNum-1)%3)>=1;document.getElementById('hint').textContent='Arraste os blocos pelo ⠿ para reorganizar — fica salvo no seu perfil.';
  const tri=c.triAtual;const rp=c.metaRoas?`<span class="pill ${c.roasAtingido?'ok':'bad'}">meta ${c.metaRoas}</span>`:'';const gran=d.periodo.gran;const A=d.comparativoAnos.anos;const hasVar=A.length>=2;
  const blocks=[];
  blocks.push(bloco('mesatual','',(()=>{const pm=pj.projecaoMes;const rm=d.resumoMes;const fp=v=>v==null?'—':(v>0?'+':'')+v.toFixed(0)+'%';const cp=v=>v==null?'var(--muted)':v>=0?'var(--pos)':'var(--neg)';const cbg=v=>'var(--surface2)';const cbd=v=>'var(--line)';const sc=d.semaforo.status;const scol=sc==='verde'?'var(--pos)':sc==='amarelo'?'var(--accent2)':sc==='vermelho'?'var(--neg)':'var(--muted)';
    const feitoPct=pm.meta?Math.min(pm.realizado/pm.meta*100,100):0;const projPct=pm.meta?Math.min(pm.projetado/pm.meta*100,100):0;const ext=Math.max(projPct-feitoPct,0);const restam=Math.max(pm.diasMes-pm.diasDecorridos,0);const falta=Math.max(pm.meta-pm.realizado,0);const pctf=pm.meta?pm.realizado/pm.meta*100:null;const necDia=restam>0?falta/restam:0;
    return `<div class="card" style="border-left:4px solid ${scol}">
    <div class="statusbar"><span class="sfdot sf-${sc}"></span><span class="sflabel">${d.semaforo.label}</span><span class="right"><span class="upd" id="updInfo"></span><button onclick="copiarResumo()" id="btnCopiar">📋 Copiar resumo</button></span></div>

function baseLine(){return {maintainAspectRatio:true,interaction:{mode:'index',intersect:false},plugins:{legend:{labels:{color:TC.tick,boxWidth:11,usePointStyle:true}}},scales:{y:{ticks:{color:TC.tick,callback:v=>comp(v)},grid:{color:TC.grid}},x:{ticks:{color:TC.tick,maxTicksLimit:16},grid:{display:false}}}};}

  charts.push(new Chart(document.getElementById(id),{type:'doughnut',data:{datasets:[{data:[v,Math.max(100-v,0)],backgroundColor:[col,TC.grid],borderWidth:0}]},options:{maintainAspectRatio:false,cutout:'74%',plugins:{legend:{display:false},tooltip:{enabled:false}}}}));}
function desCanal(pc){charts.push(new Chart(document.getElementById('chCanal'),{type:'doughnut',data:{labels:pc.map(c=>c.canal),datasets:[{data:pc.map(c=>c.faturamento),backgroundColor:pc.map((c,i)=>cor(c.canal,i)),borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fBRL2.format(c.parsed)}}}}}));
  const t=pc.reduce((s,c)=>s+c.faturamento,0)||1;
  document.getElementById('legCanal').innerHTML=pc.map((c,i)=>`<li><span class="sw" style="background:${cor(c.canal,i)}"></span><span>${c.canal}</span><span class="lv num">${fBRL2.format(c.faturamento)} · ${(c.faturamento/t*100).toFixed(1)}%</span></li>`).join('');}
function desRoas(roas,meta){const mx=Math.max(...roas.map(r=>r.roas||0),meta||0,1);

    return `<div class="r"><span>${r.canal}</span><span class="bar"><span style="width:${w}%;background:${c}"></span></span><span class="roasnum num" style="color:${c}">${fNum2(r.roas)}</span></div>`;}).join('') : '<div class="empty">Sem dados de ADS no período.</div>';}

// período
function marcaRange(tipo){document.querySelectorAll('[data-range]').forEach(b=>b.classList.toggle('on',b.dataset.range===tipo));atualizaShowing(tipo);}
const RANGE_LBL={mes:'Mês vigente',ano:'Este ano',anoant:'Ano passado','30d':'Últimos 30 dias',tudo:'Período completo',q1:'Q1',q2:'Q2',q3:'Q3',q4:'Q4'};
function fmtBR(iso){return iso?iso.slice(8,10)+'/'+iso.slice(5,7)+'/'+iso.slice(0,4):'—';}
function atualizaShowing(tipo){const el=document.getElementById('showing');if(!el)return;const nome=RANGE_LBL[tipo]||'Período personalizado';const de=state.de||(document.getElementById('de')||{}).value;const ate=state.ate||(document.getElementById('ate')||{}).value;const nc=(state.canais&&state.canais.length)?state.canais.length:(canaisDisp.length||0);el.innerHTML=`Mostrando: <span class="cor">${nome}</span> · <b>${fmtBR(de)}</b> até <b>${fmtBR(ate)}</b>${nc?` · <b>${nc} ${nc===1?'canal':'canais'}</b>`:''}`;}
function setRange(tipo){marcaRange(tipo);const ey=anos[anos.length-1]||new Date().getFullYear();const hoje=new Date();const ontem=new Date(hoje);ontem.setDate(ontem.getDate()-1);const isoD=dt=>dt.toISOString().slice(0,10);const pad=n=>String(n).padStart(2,'0');
  if(tipo==='mes'){state.de=isoD(new Date(hoje.getFullYear(),hoje.getMonth(),1));state.ate=isoD(ontem);}
  else if(tipo==='ano'){state.de=ey+'-01-01';state.ate=(maxData&&+maxData.slice(0,4)===ey)?maxData:ey+'-12-31';}
  else if(tipo==='anoant'){state.de=(ey-1)+'-01-01';state.ate=(ey-1)+'-12-31';}
  else if(tipo==='30d'){const e=maxData||isoD(hoje);const dt=new Date(e);dt.setDate(dt.getDate()-29);state.de=isoD(dt);state.ate=e;}
  else if(tipo==='tudo'){state.de=(anos[0]||ey)+'-01-01';state.ate=maxData||ey+'-12-31';}
  else if(/^q[1-4]$/.test(tipo)){const y=state.ate?+state.ate.slice(0,4):ey;const q=+tipo[1];const last=new Date(y,q*3,0).getDate();state.de=`${y}-${pad((q-1)*3+1)}-01`;state.ate=`${y}-${pad(q*3)}-${pad(last)}`;}
  carregar();}

function montaCanais(disp,sel){canaisDisp=disp||[];const selSet=new Set(sel||[]);const p=document.getElementById('canaisPanel');
  p.innerHTML=`<div class="acts"><a id="cTodos">Todos</a><a id="cNenhum">Limpar</a></div>`+canaisDisp.map(c=>`<label><input type="checkbox" value="${c}" ${selSet.has(c)?'checked':''}> ${c}</label>`).join('')+`<div style="margin-top:8px"><button class="primary" id="cAplicar" style="width:100%">Aplicar</button></div>`;
  document.getElementById('btnCanais').textContent=`Canais (${selSet.size||canaisDisp.length}) ▾`;
  document.getElementById('cTodos').onclick=()=>p.querySelectorAll('input').forEach(i=>i.checked=true);
  document.getElementById('cNenhum').onclick=()=>p.querySelectorAll('input').forEach(i=>i.checked=false);
  document.getElementById('cAplicar').onclick=()=>{const m=[...p.querySelectorAll('input:checked')].map(i=>i.value);state.canais=m.length?m:null;p.classList.remove('on');carregar();};}

document.getElementById('abaSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{aba=b.dataset.aba;document.querySelectorAll('#abaSeg button').forEach(x=>x.classList.toggle('on',x.dataset.aba===aba));if(ultData)render(ultData);});

function showDiag(){let ov=document.getElementById('diagOverlay');if(!ov){ov=document.createElement('div');ov.id='diagOverlay';ov.className='overlay';document.body.appendChild(ov);}
  const d=ultDiag||{};const nomes={adsRenova:'ADS RENOVA',adsTiktok:'ADS TikTok',retroRenova:'RETROATIVO/RENOVA',retroTiktok:'Retroativo TikTok'};let txt='';
  for(const k of Object.keys(nomes)){const t=d[k];if(!t)continue;txt+=`<b>${nomes[k]}</b>\n  registros: ${t.registros}\n`;if(t.obs)txt+=`  (${t.obs})\n`;if(t.canais)txt+=`  canais: ${t.canais.join(', ')}\n`;if(t.primeiraData)txt+=`  datas: ${t.primeiraData} a ${t.ultimaData}\n`;if(t.faturamentoTotal!=null)txt+=`  faturamento total: ${fBRL2.format(t.faturamentoTotal)}\n`;if(t.custoTotal!=null)txt+=`  custo: ${fBRL2.format(t.custoTotal)} | receita ADS: ${fBRL2.format(t.receitaTotal)}\n`;txt+='\n';}
  ov.innerHTML=`<div class="modal"><h3>🔍 Diagnóstico de leitura</h3><p>Compare com a sua planilha. Se algo divergir, me mande um print.</p><div class="diag">${txt||'Sem dados.'}</div><div class="modalfoot"><button class="primary" onclick="document.getElementById('diagOverlay').classList.remove('on')">Fechar</button></div></div>`;ov.classList.add('on');}
document.getElementById('btnDiag').onclick=showDiag;
