<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Teste de leitura do Google Sheets</title>
<style>
  body{font-family:system-ui,Segoe UI,Arial,sans-serif;background:#0e1015;color:#eef1f6;margin:0;padding:20px;font-size:14px;line-height:1.5}
  h1{font-size:18px}
  .card{background:#161922;border:1px solid #272c3a;border-radius:12px;padding:14px 16px;margin:12px 0}
  .ok{color:#22c55e;font-weight:700}
  .bad{color:#fb7185;font-weight:700}
  .muted{color:#9aa3b2;font-size:12px}
  pre{background:#0b0d12;border:1px solid #272c3a;border-radius:8px;padding:10px;overflow:auto;font-size:11px;white-space:pre-wrap;word-break:break-word}
  code{color:#0ea5e9}
</style>
</head>
<body>
  <h1>🔎 Teste de leitura do Google Sheets (direto no navegador)</h1>
  <p class="muted">Esta página tenta ler as 4 abas publicadas. Se aparecer <span class="ok">✅ conseguiu ler</span> em todas, o painel novo vai funcionar. Se aparecer <span class="bad">❌ bloqueado (CORS)</span>, me avise que eu mudo a estratégia.</p>
  <div id="saida"></div>

<script>
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSM6NRFxSThFzMqIyJyE18h1lI1nuMvTKuzMKW-aoyJwfC031l_Q0NJSChBFVTUQJUrRLGjIM9gyOwq';
const ABAS = [
  { nome: 'ADS RENOVA',          gid: '432173951' },
  { nome: 'ADS TikTok',          gid: '178673841' },
  { nome: 'RETROATIVO / RENOVA', gid: '80783708'  },
  { nome: 'Retroativo TikTok',   gid: '611256132' },
];
const csvUrl = (gid) => `${BASE}/pub?gid=${gid}&single=true&output=csv`;
const saida = document.getElementById('saida');

function bloco(html){ const d=document.createElement('div'); d.className='card'; d.innerHTML=html; saida.appendChild(d); }

(async () => {
  for (const aba of ABAS) {
    const url = csvUrl(aba.gid);
    try {
      const res = await fetch(url, { redirect: 'follow' });
      const txt = await res.text();
      if (txt.trim().startsWith('<')) {
        bloco(`<b>${aba.nome}</b> <span class="bad">❌ não retornou CSV</span><div class="muted">A resposta veio como página (HTML), não como CSV. Confira se a aba está publicada como CSV.</div>`);
        continue;
      }
      const linhas = txt.split('\n');
      const previa = linhas.slice(0, 4).map(l => l.slice(0, 120)).join('\n');
      bloco(`<b>${aba.nome}</b> <span class="ok">✅ conseguiu ler</span> — ${linhas.length} linhas.<div class="muted">Prévia (4 primeiras linhas):</div><pre>${previa.replace(/</g,'&lt;')}</pre>`);
    } catch (e) {
      bloco(`<b>${aba.nome}</b> <span class="bad">❌ bloqueado / erro</span><div class="muted">${(e && e.message) || e}</div><div class="muted">Se disser algo sobre <code>CORS</code> ou <code>Failed to fetch</code>, é o bloqueio que eu mencionei.</div>`);
    }
  }
  bloco('<b>Fim do teste.</b> <span class="muted">Me manda um print desta tela.</span>');
})();
</script>
</body>
</html>
